<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Chat - Penguin.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --bg-card: #151515;
            --bg-hover: #1f1f1f;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a1;
            --text-muted: #6b6b6b;
            --border-color: #262626;
            --accent-blue: #2563eb;
            --accent-blue-hover: #1d4ed8;
            --accent-coral: #e85a4f;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-dot {
            color: var(--accent-coral);
        }

        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .nav-item-badge {
            margin-left: auto;
            background-color: var(--accent-blue);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .user-profile:hover {
            background-color: var(--bg-hover);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .user-status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-green);
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            width: 400px;
        }

        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .search-bar svg {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .icon-btn:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            background-color: var(--accent-coral);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .chat-shell {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 0;
        }

        .chat-list {
            width: 100%;
            background: rgba(13, 21, 32, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .chat-list-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .chat-list-header h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .chat-search {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .chat-search svg {
            width: 18px;
            height: 18px;
            color: rgba(255, 255, 255, 0.4);
        }

        .chat-search input {
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            width: 100%;
        }

        .chat-search input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .chat-tabs {
            display: flex;
            padding: 12px 20px;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .chat-tab {
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: 0.2s ease;
        }

        .chat-tab:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
        }

        .chat-tab.active {
            background: rgba(37, 99, 235, 0.18);
            border-color: rgba(37, 99, 235, 0.28);
            color: #bfdbfe;
        }

        .chat-items {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(255,255,255,0.04);
        }

        .chat-item.active {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.08);
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            position: relative;
        }

        .chat-avatar-dot {
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            border: 2px solid #111;
        }

        .chat-meta {
            flex: 1;
            min-width: 0;
        }

        .chat-top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }

        .chat-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            flex-shrink: 0;
        }

        .chat-preview-text {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-unread {
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 999px;
            background: var(--accent-blue);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-main {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        .conversation-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: rgba(255,255,255,0.02);
        }

        .conversation-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .conversation-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            position: relative;
            flex-shrink: 0;
        }

        .conversation-avatar-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-green);
            border: 2px solid #111;
        }

        .conversation-info {
            min-width: 0;
        }

        .conversation-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .conversation-status {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
        }

        .conversation-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-action-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .mini-action-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .mini-action-btn svg {
            width: 18px;
            height: 18px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0));
        }

        .date-separator {
            align-self: center;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            padding: 6px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 999px;
            margin-bottom: 6px;
        }

        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            max-width: 72%;
        }

        .message-row.you {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-row.other {
            align-self: flex-start;
        }

        .message-bubble {
            border-radius: 16px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.55;
            word-break: break-word;
        }

        .message-row.other .message-bubble {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
        }

        .message-row.you .message-bubble {
            background: var(--accent-blue);
            color: #fff;
        }

        .message-meta {
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            margin-top: 4px;
        }

        .composer {
            padding: 18px 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
        }

        .composer-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .composer-chip {
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .composer-chip:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .assist-panel {
            margin-bottom: 14px;
            display: none;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
        }

        .assist-panel.show {
            display: block;
        }

        .assist-row {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .assist-row:last-child {
            border-bottom: none;
        }

        .assist-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 6px;
        }

        .assist-value {
            font-size: 13px;
            line-height: 1.55;
            color: rgba(255,255,255,0.9);
        }

        .assist-value.muted {
            color: rgba(255,255,255,0.55);
        }

        .priority-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            width: fit-content;
        }

        .priority-pill.normal {
            background: rgba(34,197,94,0.14);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.2);
        }

        .priority-pill.important {
            background: rgba(245,158,11,0.14);
            color: #fcd34d;
            border: 1px solid rgba(245,158,11,0.22);
        }

        .priority-pill.urgent {
            background: rgba(239,68,68,0.14);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.22);
        }

        .composer-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .composer-input-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px 14px;
        }

        .composer-input-wrap svg {
            width: 18px;
            height: 18px;
            color: rgba(255,255,255,0.45);
            flex-shrink: 0;
        }

        .composer-input {
            flex: 1;
            border: none;
            background: transparent;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .composer-input::placeholder {
            color: rgba(255,255,255,0.38);
        }

        .send-btn,
        .rewrite-btn {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s ease;
        }

        .send-btn {
            background: var(--accent-blue);
        }

        .send-btn:hover {
            background: var(--accent-blue-hover);
        }

        .rewrite-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .rewrite-btn:hover {
            background: rgba(255,255,255,0.12);
        }

        .empty-state {
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            text-align: center;
            padding: 22px 10px;
        }

        @media (max-width: 980px) {
            .chat-shell {
                grid-template-columns: 280px 1fr;
            }

            .search-bar {
                width: 280px;
            }
        }

        @media (max-width: 860px) {
            .sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
            }

            .chat-shell {
                grid-template-columns: 1fr;
            }

            .chat-list {
                display: none;
            }

            .top-header {
                padding: 16px 20px;
            }

            .search-bar {
                width: 100%;
                max-width: 320px;
            }

            .composer-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    
        .assist-value {
            transition: border-left 0.2s ease, padding-left 0.2s ease;
        }

    </style>
</head>

    <script>
        const chats = [
            {
                id: 1,
                tab: 'teams',
                name: 'Engineering Team',
                avatar: 'EN',
                status: '6 members • 2 online',
                time: '2m',
                unread: 3,
                preview: 'Please check the new meeting room flow before the demo.',
                pinned: false,
                online: true,
                messages: [
                    { sender: 'other', text: 'Morning team. Please review the create/join flow before the presentation.', time: '09:10 AM' },
                    { sender: 'you', text: 'I updated the dashboard and the call-room flow already.', time: '09:13 AM' },
                    { sender: 'other', text: 'Great. Also test the two-device connection once more.', time: '09:15 AM' }
                ]
            },
            {
                id: 2,
                tab: 'teams',
                name: 'Design Review',
                avatar: 'DR',
                status: '4 members • Reviewing screens',
                time: '12m',
                unread: 1,
                preview: 'Can we reduce the overlap in the call room labels?',
                pinned: false,
                online: true,
                messages: [
                    { sender: 'other', text: 'The gesture label overlaps the participant name.', time: '08:52 AM' },
                    { sender: 'you', text: 'I moved it lower with more white space already.', time: '08:55 AM' }
                ]
            },
            {
                id: 3,
                tab: 'direct',
                name: 'Ava',
                avatar: 'AV',
                status: 'Online now',
                time: '25m',
                unread: 0,
                preview: 'Send me the final code for team chat when ready.',
                pinned: false,
                online: true,
                messages: [
                    { sender: 'other', text: 'Send me the final code for team chat when ready.', time: '08:30 AM' },
                    { sender: 'you', text: 'I am cleaning the layout first, then I will send it.', time: '08:33 AM' }
                ]
            },
            {
                id: 4,
                tab: 'direct',
                name: 'Liam',
                avatar: 'LI',
                status: 'Last seen 1 hour ago',
                time: '1h',
                unread: 2,
                preview: 'The meeting ID and password are working now.',
                pinned: false,
                online: false,
                messages: [
                    { sender: 'other', text: 'The meeting ID and password are working now.', time: '07:18 AM' },
                    { sender: 'you', text: 'Nice. Next we standardize the side pages.', time: '07:26 AM' }
                ]
            },
            {
                id: 5,
                tab: 'archived',
                name: 'Old Project Archive',
                avatar: 'AR',
                status: 'Archived channel',
                time: 'Yesterday',
                unread: 0,
                preview: 'Previous semester references and notes.',
                pinned: false,
                online: false,
                messages: [
                    { sender: 'other', text: 'Previous semester references and notes are stored here.', time: 'Yesterday' }
                ]
            }
        ];

        let currentTab = 'teams';
        let currentChatId = 1;
        let currentSuggestion = '';

        const chatItemsEl = document.getElementById('chatItems');
        const messagesEl = document.getElementById('messages');
        const chatSearchEl = document.getElementById('chatSearch');
        const messageInputEl = document.getElementById('messageInput');
        const assistPanelEl = document.getElementById('assistPanel');
        const clarityValueEl = document.getElementById('clarityValue');
        const rewriteValueEl = document.getElementById('rewriteValue');
        const priorityPillEl = document.getElementById('priorityPill');

        const informalReplacements = [
            { from: /\bpls\b|\bplz\b/gi, to: 'please' },
            { from: /\bu\b/gi, to: 'you' },
            { from: /\bur\b/gi, to: 'your' },
            { from: /\br\b/gi, to: 'are' },
            { from: /\bthx\b|\bty\b|\bthanks\b/gi, to: 'thank you' },
            { from: /\basap\b/gi, to: 'as soon as possible' },
            { from: /\bidk\b/gi, to: 'I am not sure' },
            { from: /\bimo\b|\bimho\b/gi, to: 'in my opinion' },
            { from: /\bgonna\b/gi, to: 'going to' },
            { from: /\bwanna\b/gi, to: 'want to' },
            { from: /\bgotta\b/gi, to: 'need to' },
            { from: /\bkinda\b/gi, to: 'somewhat' },
            { from: /\bcuz\b|\bcos\b|\bcause\b/gi, to: 'because' },
            { from: /\bnvm\b/gi, to: 'never mind' },
            { from: /\btbh\b/gi, to: 'to be honest' },
            { from: /\bbrb\b/gi, to: 'I will be back shortly' },
            { from: /\bomg\b/gi, to: '' },
            { from: /\blol\b|\blmao\b|\bhaha+\b|\bhehe+\b/gi, to: '' },
            { from: /\bbro\b|\bdude\b|\bman\b|\bbrother\b/gi, to: '' },
            { from: /\bchill\b/gi, to: 'please do not worry' },
            { from: /\bmessed up\b/gi, to: 'encountered an issue' },
            { from: /\bbroken\b/gi, to: 'not working correctly' },
            { from: /\bbuggy\b/gi, to: 'unstable' },
            { from: /\bbad\b/gi, to: 'problematic' },
            { from: /\btrash\b/gi, to: 'not suitable yet' },
            { from: /\bweird\b/gi, to: 'unexpected' }
        ];

        const rewriteRules = [
            {
                patterns: [/send it/i, /send me/i, /give me/i],
                rewrite: () => 'Could you please send the relevant file or details as soon as possible?'
            },
            {
                patterns: [/fix it/i, /fix this/i, /do it/i],
                rewrite: () => 'Could you please review the issue and update me once it has been fixed?'
            },
            {
                patterns: [/check this/i, /look at this/i],
                rewrite: () => 'Could you please review this and share your feedback when you have time?'
            },
            {
                patterns: [/call/i, /meeting/i],
                rewrite: () => 'Could we move this discussion to a short call so we can clarify it faster?'
            },
            {
                patterns: [/not working/i, /doesn't work/i, /dont work/i, /bug/i, /error/i],
                rewrite: () => 'The feature is currently not working as expected. Could you please help review the issue?'
            },
            {
                patterns: [/later/i, /soon/i, /maybe/i],
                rewrite: () => 'Could we confirm a specific time or deadline for this task?'
            },
            {
                patterns: [/as soon as possible/i, /urgent/i, /immediately/i],
                rewrite: () => 'This is urgent. Could you please prioritize it and update the team as soon as possible?'
            }
        ];

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function normalizeMessage(message) {
            return (message || '').trim().replace(/\s+/g, ' ');
        }

        function cleanForRewrite(message) {
            let cleaned = normalizeMessage(message);

            informalReplacements.forEach(rule => {
                cleaned = cleaned.replace(rule.from, rule.to);
            });

            return cleaned
                .replace(/\s+/g, ' ')
                .replace(/\s+([,.!?])/g, '$1')
                .trim();
        }

        function sentenceCase(message) {
            const trimmed = normalizeMessage(message);
            if (!trimmed) return '';
            return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
        }

        function ensurePunctuation(message) {
            const trimmed = normalizeMessage(message);
            if (!trimmed) return '';
            return /[.!?]$/.test(trimmed) ? trimmed : `${trimmed}.`;
        }

        function detectPriority(message) {
            const lower = message.toLowerCase();

            if (/(asap|urgent|immediately|right now|emergency|critical|blocked|cannot continue|need now)/i.test(lower)) {
                return { label: 'Urgent', className: 'urgent' };
            }

            if (/(important|deadline|today|priority|before class|before demo|presentation|submit|review today)/i.test(lower)) {
                return { label: 'Important', className: 'important' };
            }

            return { label: 'Normal', className: 'normal' };
        }

        function detectClarityIssue(message) {
            const lower = message.toLowerCase();
            const issues = [];

            const vagueWords = [
                'later', 'soon', 'maybe', 'something', 'somehow',
                'idk', 'whenever', 'stuff', 'that thing', 'this thing'
            ];

            vagueWords.forEach(word => {
                const pattern = new RegExp(`\\b${word.replace(/\s+/g, '\\s+')}\\b`, 'i');
                if (pattern.test(lower)) issues.push(`"${word}" may be too vague`);
            });

            if (lower.length < 8) issues.push('message is too short');

            if (/(do it|fix it|send it|check it|make it)/i.test(lower)) {
                issues.push('task or file is not clearly specified');
            }

            if (!/(today|tomorrow|at|by|before|after|\d|am|pm|morning|evening|deadline)/i.test(lower) &&
                /(urgent|asap|soon|later|deadline|send|review|fix|submit)/i.test(lower)) {
                issues.push('time or deadline is missing');
            }

            if (issues.length === 0) return '';
            return `Possible clarity issue: ${issues.slice(0, 2).join('; ')}. Consider adding the exact task, file, or deadline.`;
        }

        function hasInformalLanguage(message) {
            return /(bro|dude|lol|lmao|haha|pls|plz|thx|ty|idk|gonna|wanna|gotta|asap|\bu\b|\bur\b|cuz|brb|omg|tbh|nvm)/i.test(message);
        }

        function chooseTemplate(cleaned, priority) {
            const lower = cleaned.toLowerCase();

            for (const rule of rewriteRules) {
                if (rule.patterns.some(pattern => pattern.test(lower))) {
                    return rule.rewrite(cleaned);
                }
            }

            if (/please|could you|would you|kindly|it would be helpful/i.test(cleaned)) {
                return ensurePunctuation(sentenceCase(cleaned));
            }

            if (priority.label === 'Urgent') {
                return `This is urgent. Could you please ${cleaned}?`;
            }

            const styles = [
                msg => `Could you please ${msg}`,
                msg => `Please ${msg}`,
                msg => `Would you be able to ${msg}`,
                msg => `It would be helpful if you could ${msg}`
            ];

            const selected = styles[Math.abs(cleaned.length) % styles.length];
            return selected(cleaned);
        }

        function rewriteProfessionally(message) {
            const original = normalizeMessage(message);
            const cleaned = cleanForRewrite(original);
            if (!cleaned) return '';

            const priority = detectPriority(original);
            let rewritten = chooseTemplate(cleaned, priority);

            rewritten = rewritten
                .replace(/\bplease please\b/gi, 'please')
                .replace(/\byou you\b/gi, 'you')
                .replace(/\s+/g, ' ')
                .trim();

            rewritten = sentenceCase(rewritten);
            rewritten = ensurePunctuation(rewritten);

            if (rewritten.toLowerCase() === original.toLowerCase()) return '';
            return rewritten;
        }

        function updateComposerAssist() {
            const text = normalizeMessage(messageInputEl.value);

            if (!text) {
                assistPanelEl.classList.remove('show');
                clarityValueEl.textContent = 'No clarity issue detected.';
                clarityValueEl.className = 'assist-value muted';
                clarityValueEl.style.borderLeft = 'none';
                clarityValueEl.style.paddingLeft = '0';
                rewriteValueEl.textContent = 'No rewrite suggestion yet.';
                rewriteValueEl.className = 'assist-value muted';
                rewriteValueEl.style.borderLeft = 'none';
                rewriteValueEl.style.paddingLeft = '0';
                priorityPillEl.textContent = 'Normal';
                priorityPillEl.className = 'priority-pill normal';
                currentSuggestion = '';
                return;
            }

            assistPanelEl.classList.add('show');

            const priority = detectPriority(text);
            priorityPillEl.textContent = priority.label;
            priorityPillEl.className = `priority-pill ${priority.className}`;

            const clarityIssue = detectClarityIssue(text);
            if (clarityIssue) {
                clarityValueEl.textContent = clarityIssue;
                clarityValueEl.className = 'assist-value';
                clarityValueEl.style.borderLeft = '3px solid #f59e0b';
                clarityValueEl.style.paddingLeft = '10px';
            } else {
                clarityValueEl.textContent = 'No clarity issue detected.';
                clarityValueEl.className = 'assist-value muted';
                clarityValueEl.style.borderLeft = 'none';
                clarityValueEl.style.paddingLeft = '0';
            }

            const rewritten = rewriteProfessionally(text);
            if (rewritten) {
                rewriteValueEl.textContent = rewritten;
                rewriteValueEl.className = 'assist-value';
                rewriteValueEl.style.borderLeft = '3px solid #22c55e';
                rewriteValueEl.style.paddingLeft = '10px';
                currentSuggestion = rewritten;
            } else if (hasInformalLanguage(text)) {
                const cleaned = ensurePunctuation(sentenceCase(cleanForRewrite(text)));
                rewriteValueEl.textContent = cleaned;
                rewriteValueEl.className = 'assist-value';
                rewriteValueEl.style.borderLeft = '3px solid #22c55e';
                rewriteValueEl.style.paddingLeft = '10px';
                currentSuggestion = cleaned;
            } else {
                rewriteValueEl.textContent = 'Your message already looks professional.';
                rewriteValueEl.className = 'assist-value muted';
                rewriteValueEl.style.borderLeft = 'none';
                rewriteValueEl.style.paddingLeft = '0';
                currentSuggestion = '';
            }
        }

        function getFilteredChats() {
            const query = chatSearchEl.value.trim().toLowerCase();
            return chats.filter(chat => {
                const matchesTab = chat.tab === currentTab;
                const matchesQuery = !query || chat.name.toLowerCase().includes(query) || chat.preview.toLowerCase().includes(query);
                return matchesTab && matchesQuery;
            });
        }

        function renderChatList() {
            const filtered = getFilteredChats();

            if (!filtered.length) {
                chatItemsEl.innerHTML = `<div class="empty-state">No chats found in this tab.</div>`;
                return;
            }

            chatItemsEl.innerHTML = filtered.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" data-id="${chat.id}">
                    <div class="chat-avatar">
                        ${escapeHtml(chat.avatar)}
                        ${chat.online ? '<span class="chat-avatar-dot"></span>' : ''}
                    </div>
                    <div class="chat-meta">
                        <div class="chat-top-row">
                            <div class="chat-name">${escapeHtml(chat.name)}</div>
                            <div class="chat-time">${escapeHtml(chat.time)}</div>
                        </div>
                        <div class="chat-preview-text">${escapeHtml(chat.preview)}</div>
                    </div>
                    ${chat.unread > 0 ? `<div class="chat-unread">${chat.unread}</div>` : ''}
                </div>
            `).join('');

            document.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentChatId = Number(item.dataset.id);
                    const selectedChat = chats.find(chat => chat.id === currentChatId);
                    if (selectedChat) selectedChat.unread = 0;
                    renderChatList();
                    renderConversation();
                });
            });
        }

        function renderConversation() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) {
                messagesEl.innerHTML = `<div class="empty-state">Select a chat to start messaging.</div>`;
                return;
            }

            document.getElementById('conversationName').textContent = chat.name;
            document.getElementById('conversationStatus').textContent = chat.status;

            const initials = chat.name.split(' ').map(part => part[0]).join('').slice(0, 2).toUpperCase();
            document.getElementById('conversationAvatar').childNodes[0].nodeValue = initials;
            document.getElementById('conversationAvatarDot').style.display = chat.online ? 'block' : 'none';

            const messageHtml = [
                `<div class="date-separator">Today</div>`,
                ...chat.messages.map(msg => `
                    <div class="message-row ${msg.sender === 'you' ? 'you' : 'other'}">
                        <div>
                            <div class="message-bubble">${escapeHtml(msg.text)}</div>
                            <div class="message-meta">${escapeHtml(msg.time)}</div>
                        </div>
                    </div>
                `)
            ].join('');

            messagesEl.innerHTML = messageHtml;
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function sendMessage() {
            const text = normalizeMessage(messageInputEl.value);
            if (!text) return;

            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const priority = detectPriority(text);

            let finalText = text;
            if (priority.label !== 'Normal') finalText = `[${priority.label}] ${text}`;

            chat.messages.push({ sender: 'you', text: finalText, time });
            chat.preview = finalText;
            chat.time = 'Now';
            chat.unread = 0;

            messageInputEl.value = '';
            currentSuggestion = '';
            updateComposerAssist();
            renderChatList();
            renderConversation();
        }

        function switchTab(tab) {
            currentTab = tab;
            const availableChats = chats.filter(chat => chat.tab === currentTab);
            currentChatId = availableChats.length ? availableChats[0].id : null;

            document.querySelectorAll('.chat-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            renderChatList();
            renderConversation();
        }

        document.querySelectorAll('.chat-tab').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        chatSearchEl.addEventListener('input', renderChatList);
        messageInputEl.addEventListener('input', updateComposerAssist);

        messageInputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        document.getElementById('rewriteBtn').addEventListener('click', () => {
            if (!currentSuggestion) {
                updateComposerAssist();
                return;
            }
            messageInputEl.value = currentSuggestion;
            updateComposerAssist();
            messageInputEl.focus();
        });

        document.querySelectorAll('.composer-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                messageInputEl.value = chip.dataset.insert;
                updateComposerAssist();
                messageInputEl.focus();
            });
        });

        document.getElementById('callChatBtn').addEventListener('click', () => {
            window.location.href = 'join-meeting.html';
        });

        document.getElementById('pinChatBtn').addEventListener('click', () => {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            chat.pinned = !chat.pinned;
            alert(chat.pinned ? 'Chat pinned.' : 'Chat unpinned.');
        });

        document.getElementById('newChatBtn').addEventListener('click', () => {
            alert('New chat action placeholder.');
        });

        renderChatList();
        renderConversation();
        updateComposerAssist();
    </script>
</body>
</html>
